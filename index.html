/* ---------- date helpers ---------- */
const dayIndex = (d) => DAYS.indexOf(d);
const pad = (n) => String(n).padStart(2, "0");
const iso = (dt) => `${dt.getFullYear()}-${pad(dt.getMonth() + 1)}-${pad(dt.getDate())}`;
function mondayOf(date) {
  const d = new Date(date);
  const wd = (d.getDay() + 6) % 7; // Mon=0
  d.setDate(d.getDate() - wd);
  d.setHours(0, 0, 0, 0);
  return d;
}
function addDays(date, n) {
  const d = new Date(date);
  d.setDate(d.getDate() + n);
  return d;
}
function fmtLong(dt) {
  return dt.toLocaleDateString("en-IN", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
}
function fmtShort(dt) {
  return dt.toLocaleDateString("en-IN", { day: "numeric", month: "short" });
}

      try {

        return rows && rows[0] ? rows[0].data : null;
      } catch (e) { return null; }
    }
    try { const r = await window.storage.get(k, true); return r ? JSON.parse(r.value) : null; }

  async set(k, v) {

          headers: { ...supaHeaders(), Prefer: "resolution=merge-duplicates" },
          body: JSON.stringify({ id: k, data: v, updated_at: new Date().toISOString() }),
        });
        return true;
      } catch (e) { return false; }
    }
    try { await window.storage.set(k, JSON.stringify(v), true); return true; }
    catch (e) { return false; }
  },
};

/* ---------- enumerate every occurrence of a course across the term ---------- */
function enumerateCourse(data, courseId) {
  const start = mondayOf(new Date(data.termStartISO + "T00:00:00"));
  const slotSort = {};
  data.slots.forEach((s) => (slotSort[s.id] = s.sort));
  const sessions = data.sessions
    .filter((s) => s.courseId === courseId)
    .sort((a, b) => dayIndex(a.day) - dayIndex(b.day) || (slotSort[a.slotId] - slotSort[b.slotId]));
  const out = [];
  for (let w = 0; w < data.termWeeks; w++) {
    const weekMon = addDays(start, w * 7);
    sessions.forEach((s) => {
      const date = addDays(weekMon, dayIndex(s.day));
      out.push({ dateISO: iso(date), date, sessionId: s.id, slotId: s.slotId, week: w + 1 });
    });
  }
  out.sort((a, b) => (a.dateISO < b.dateISO ? -1 : a.dateISO > b.dateISO ? 1 : slotSort[a.slotId] - slotSort[b.slotId]));
  return out;
}
const attKey = (courseId, dateISO, slotId) => `${courseId}|${dateISO}|${slotId}`;

/* ---------- the natural-language schedule editor (Claude) ---------- */
async function runAssistant(prompt, data) {
  const courseList = data.courses.map((c) => `- ${c.name} (faculty: ${c.faculty})`).join("\n");
  const slotList = data.slots.map((s) => `- "${s.label}"`).join("\n");
  const gridLines = [];
  data.sessions.forEach((se) => {
    const c = data.courses.find((x) => x.id === se.courseId);
    const sl = data.slots.find((x) => x.id === se.slotId);
    gridLines.push(`${se.day} | ${sl ? sl.label : se.slotId} | ${c ? c.name : "?"}${se.due ? ` | due: ${se.due}` : ""}`);
  });

  // Pre-compute a real calendar reference so the model never guesses weekdays.
  const wd = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const dateRows = [];
  for (let off = -3; off <= 7; off++) {
    const dt = addDays(today, off);
    const tag = off === 0 ? "  <-- TODAY" : "";
    dateRows.push(`${iso(dt)} = ${wd[dt.getDay()]}${tag}`);
  }
  const calendar = `CALENDAR (authoritative — use these weekday/date pairings, never your own):\n${dateRows.join("\n")}`;

  const sys =
    `You edit a weekly university class timetable. Days are Monday..Friday only. ` +
    `Return ONLY a JSON object, no prose, no markdown fences. Shape:\n` +
    `{"reply":"<one short sentence>","ops":[ ... ]}\n` +
    `Allowed ops (use EXACT course names and EXACT slot labels from context where possible):\n` +
    `{"type":"add_session","course":"<name>","day":"<Day>","slot":"<exact label OR a new time like 2:00 – 3:00 PM>"}\n` +
    `{"type":"remove_session","day":"<Day>","slot":"<exact label>"}\n` +
    `{"type":"move_session","fromDay":"<Day>","fromSlot":"<label>","toDay":"<Day>","toSlot":"<label>"}\n` +
    `{"type":"rename_slot","slot":"<exact current label>","newLabel":"<new label e.g. 10:45 AM – 12:15 PM>"}\n` +
    `{"type":"update_course","course":"<name>","newName":"<opt>","faculty":"<opt>","total":<opt int>,"done":<opt int completed-count>,"photo":"<opt image URL>"}\n` +
    `{"type":"add_course","name":"<name>","faculty":"<name>","day":"<opt Day>","slot":"<opt label>"}\n` +
    `{"type":"set_due","course":"<name>","day":"<opt Day>","slot":"<opt label>","due":"<text>"}\n` +
    `{"type":"clear_due","course":"<name>","day":"<opt Day>","slot":"<opt label>"}\n` +
    `{"type":"set_term","weeks":<opt int>,"start":"<opt YYYY-MM-DD>"}\n` +
    `DATE-SPECIFIC ops (affect ONLY one calendar date, not every week):\n` +
    `*** INTENT CHECK FIRST — complete vs cancel are OPPOSITES, never confuse them ***\n` +
    `- Words like "complete", "completed", "done", "attended", "finished", "did", "mark ... done", "tick" => the class HAPPENED. Use mark_done. NEVER cancel_class.\n` +
    `- Words like "cancel", "cancelled", "no class", "off", "holiday", "skip", "removed" => the class did NOT happen. Use cancel_class.\n` +
    `If the user says "mark <date> as complete/done/attended", that is mark_done, NOT cancel_class. Do not cancel a class unless the user clearly says it is not happening.\n` +
    `{"type":"cancel_class","date":"<YYYY-MM-DD>","slot":"<exact label>"}\n` +
    `{"type":"add_oneoff","date":"<YYYY-MM-DD>","slot":"<exact label OR new time>","course":"<name>","faculty":"<opt>"}\n` +
    `{"type":"reschedule_oneoff","date":"<YYYY-MM-DD>","fromSlot":"<label>","toSlot":"<label>"}\n` +
    `{"type":"clear_exception","date":"<YYYY-MM-DD>","slot":"<exact label>"}  (restores that date's cell to the normal weekly class)\n` +
    `{"type":"restore_date","date":"<YYYY-MM-DD>"}  (removes ALL exceptions/cancellations on that date, restoring the normal weekly classes)\n` +
    `{"type":"mark_done","date":"<YYYY-MM-DD>","course":"<opt name; omit to mark ALL classes that day>","delta":<opt +1 or -1, default +1>}  (INCREMENTS the completed counter for the class(es) on that date)\n` +
    `QUIZ / ASSIGNMENT ops:\n` +
    `{"type":"add_assessment","kind":"quiz|assignment","course":"<name>","title":"<short title>","date":"<opt YYYY-MM-DD due date>","details":"<opt topics/description>","marks":"<opt e.g. 10 or 15%>"}\n` +
    `{"type":"update_assessment","match":"<title or course to find it>","kind":"<opt>","title":"<opt>","date":"<opt>","details":"<opt>","marks":"<opt>","done":<opt true/false>}\n` +
    `{"type":"remove_assessment","match":"<title or course>"}\n` +
    `Use add_assessment when the user mentions a quiz, test, exam, assignment, submission, project, or homework (e.g. "Pricing quiz on the 7th worth 10 marks", "OB assignment due Friday on motivation theories"). Resolve any date via the CALENDAR block.\n` +
    `COMPLETION RULE: When the user says they attended / completed / did class(es) on specific date(s) (e.g. "mark 29th and 30th June done", "I attended Monday's classes", "mark these as complete"), emit one mark_done op PER DATE — never cancel_class. Do NOT use update_course with a "done" value for this — update_course sets an ABSOLUTE count and will overwrite/decrease existing progress. Only use update_course "done" when the user explicitly states an absolute total (e.g. "set pricing completed to exactly 5"). To undo, use mark_done with delta -1.\n` +
    `CRITICAL DEFAULT: When the user refers to a specific date or a specific upcoming weekday (e.g. "cancel Monday's pricing", "no ops class this Wednesday", "add an extra sales class on the 7th", "move Thursday's HR to 2pm"), they mean ONLY that one date. Resolve the weekday to its YYYY-MM-DD using the CALENDAR block (default to the soonest matching date that is today or later) and use the DATE-SPECIFIC ops. ` +
    `Only use the recurring ops (remove_session / add_session / move_session) when the user explicitly says it is permanent — e.g. "every week", "permanently", "from now on", "for the rest of the term". If unsure whether it's one-time or recurring, prefer the date-specific op and say so in the reply.\n` +
    `Use rename_slot whenever the request is about changing a TIME (e.g. "change the 10:45 slot to end at 12:15") rather than moving or editing a specific course.\n` +
    `When the user mentions a date or weekday, resolve it ONLY using the CALENDAR block provided in the context. Do not state or rely on any weekday you compute yourself. If a date is a Saturday or Sunday, there are no classes that day.\n` +
    `If set_due gives only a course (no day/slot), apply it to that course's earliest upcoming class. ` +
    `Keep ops minimal. If the request is unclear, return empty ops and explain in reply.`;

  const ctx =
    `${calendar}\n\nCOURSES:\n${courseList}\n\nTIME SLOTS (rows):\n${slotList}\n\nCURRENT GRID:\n${gridLines.join("\n")}\n\n` +
    `USER REQUEST: ${prompt}`;

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      system: sys,
      messages: [{ role: "user", content: ctx }],
    }),
  });
  const json = await res.json();
  const text = (json.content || []).map((b) => (b.type === "text" ? b.text : "")).join("").trim();
  const clean = text.replace(/```json/gi, "").replace(/```/g, "").trim();
  const first = clean.indexOf("{");
  const last = clean.lastIndexOf("}");
  return JSON.parse(clean.slice(first, last + 1));
}

/* ---------- apply ops to data (pure-ish, returns new data) ---------- */
function slugColor(i) {
  const palette = ["#5C9A2E", "#3F7D34", "#8AA63B", "#2E8B72", "#B5832E", "#4A7C9B", "#9A6A3A", "#6B8E23", "#4E7A4E"];
  return palette[i % palette.length];
}
function findCourse(data, name) {
  if (!name) return null;
  const n = name.trim().toLowerCase();
  return (
    data.courses.find((c) => c.name.toLowerCase() === n) ||
    data.courses.find((c) => c.name.toLowerCase().includes(n) || n.includes(c.name.toLowerCase()))
  );
}
function findSlot(data, label) {
  if (!label) return null;
  const norm = (s) => s.toLowerCase().replace(/\s|–|-|\.|:/g, "");
  const t = norm(label);
  const exact = data.slots.find((s) => norm(s.label) === t);
  if (exact) return exact;
  // fuzzy fallback only when exactly one slot plausibly matches, to avoid cross-matching different times
  const candidates = data.slots.filter((s) => norm(s.label).includes(t) || t.includes(norm(s.label)));
  return candidates.length === 1 ? candidates[0] : null;
}
function ensureSlot(data, label) {
  let s = findSlot(data, label);
  if (s) return [data, s];
  // create a new slot, derive a sort key from a leading hour
  const m = label.match(/(\d{1,2})[:.]?(\d{2})?\s*(am|pm)?/i);
  let sort = 1000;
  if (m) {
    let h = parseInt(m[1], 10);
    const mm = m[2] ? parseInt(m[2], 10) : 0;
    const ap = (m[3] || "").toLowerCase();
    if (ap === "pm" && h < 12) h += 12;
    if (ap === "am" && h === 12) h = 0;
    if (!ap && h < 8) h += 12; // assume afternoon for bare small hours
    sort = h * 60 + mm;
  }
  const ns = { id: "slot_" + Math.random().toString(36).slice(2, 7), label: label.trim(), sort };
  return [{ ...data, slots: [...data.slots, ns] }, ns];
}

function applyOps(data, ops) {
  let d = { ...data, courses: [...data.courses], slots: [...data.slots], sessions: [...data.sessions], exceptions: { ...(data.exceptions || {}) }, assessments: [...(data.assessments || [])] };
  const notes = [];
  (ops || []).forEach((op) => {
    try {
      if (op.type === "add_course") {
        let c = findCourse(d, op.name);
        if (!c) {
          c = { id: "c_" + Math.random().toString(36).slice(2, 7), name: op.name, faculty: op.faculty || "TBA", color: slugColor(d.courses.length), total: 20, done: 0 };
          d.courses = [...d.courses, c];
          notes.push(`Added course ${c.name}`);
        }
        if (op.day && op.slot) op = { ...op, type: "add_session", course: c.name };
        else return;
      }
      if (op.type === "add_session") {
        const c = findCourse(d, op.course) || (() => {
          const nc = { id: "c_" + Math.random().toString(36).slice(2, 7), name: op.course, faculty: op.faculty || "TBA", color: slugColor(d.courses.length), total: 20, done: 0 };
          d.courses = [...d.courses, nc];
          return nc;
        })();
        let slot;
        [d, slot] = ensureSlot(d, op.slot);
        if (!DAYS.includes(op.day)) return;
        d.sessions = d.sessions.filter((s) => !(s.day === op.day && s.slotId === slot.id));
        d.sessions = [...d.sessions, { id: "se_" + Math.random().toString(36).slice(2, 7), day: op.day, slotId: slot.id, courseId: c.id, due: "" }];
        notes.push(`${c.name} → ${op.day} ${slot.label}`);
      } else if (op.type === "remove_session") {
        const slot = findSlot(d, op.slot);
        if (!slot) return;
        d.sessions = d.sessions.filter((s) => !(s.day === op.day && s.slotId === slot.id));
        notes.push(`Cleared ${op.day} ${slot.label}`);
      } else if (op.type === "move_session") {
        const fs = findSlot(d, op.fromSlot), ts0 = op.toSlot;
        if (!fs) return;
        const idx = d.sessions.findIndex((s) => s.day === op.fromDay && s.slotId === fs.id);
        if (idx < 0) return;
        let toSlot;
        [d, toSlot] = ensureSlot(d, ts0);
        const moved = { ...d.sessions[idx], day: op.toDay, slotId: toSlot.id };
        d.sessions = d.sessions.filter((_, i) => i !== idx).filter((s) => !(s.day === op.toDay && s.slotId === toSlot.id));
        d.sessions = [...d.sessions, moved];
        notes.push(`Moved to ${op.toDay} ${toSlot.label}`);
      } else if (op.type === "rename_slot") {
        const slot = findSlot(d, op.slot);
        if (!slot || !op.newLabel) return;
        const newLabel = op.newLabel.trim();
        // derive a sort key from the new label's leading hour, fallback to existing sort
        const m = newLabel.match(/(\d{1,2})[:.]?(\d{2})?\s*(am|pm)?/i);
        let sort = slot.sort;
        if (m) {
          let h = parseInt(m[1], 10);
          const mm = m[2] ? parseInt(m[2], 10) : 0;
          const ap = (m[3] || "").toLowerCase();
          if (ap === "pm" && h < 12) h += 12;
          if (ap === "am" && h === 12) h = 0;
          if (!ap && h < 8) h += 12;
          sort = h * 60 + mm;
        }
        // if another slot already has this exact new label, merge into it instead of duplicating
        const dupe = d.slots.find((s) => s.id !== slot.id && s.label.toLowerCase() === newLabel.toLowerCase());
        if (dupe) {
          d.sessions = d.sessions
            .map((s) => s.slotId === slot.id ? { ...s, slotId: dupe.id } : s)
            .filter((s, i, arr) => arr.findIndex((x) => x.day === s.day && x.slotId === s.slotId) === i);
          d.slots = d.slots.filter((s) => s.id !== slot.id);
        } else {
          d.slots = d.slots.map((s) => s.id === slot.id ? { ...s, label: newLabel, sort } : s);
        }
        notes.push(`Renamed slot to ${newLabel}`);
      } else if (op.type === "update_course") {
        const c = findCourse(d, op.course);
        if (!c) return;
        d.courses = d.courses.map((x) => {
          if (x.id !== c.id) return x;
          const total = op.total != null ? op.total : x.total;
          let done = op.done != null ? op.done : x.done;
          done = Math.max(0, Math.min(total, done));
          return { ...x, name: op.newName || x.name, faculty: op.faculty || x.faculty, total, done, photo: op.photo || x.photo };
        });
        notes.push(`Updated ${op.newName || c.name}`);
      } else if (op.type === "set_due" || op.type === "clear_due") {
        const c = findCourse(d, op.course);
        const slot = findSlot(d, op.slot);
        let targets = d.sessions.filter((s) =>
          (!c || s.courseId === c.id) && (!op.day || s.day === op.day) && (!slot || s.slotId === slot.id));
        if (op.type === "set_due" && c && !op.day && !slot) targets = targets.slice(0, 1); // earliest upcoming-ish
        const dueVal = op.type === "set_due" ? op.due : "";
        const ids = new Set(targets.map((t) => t.id));
        d.sessions = d.sessions.map((s) => ids.has(s.id) ? { ...s, due: dueVal } : s);
        notes.push(op.type === "set_due" ? `Set due note` : `Cleared due note`);
      } else if (op.type === "set_term") {
        if (op.weeks) d.termWeeks = op.weeks;
        if (op.start) d.termStartISO = op.start;
        notes.push(`Term updated`);
      } else if (op.type === "cancel_class") {
        const slot = findSlot(d, op.slot);
        if (!slot || !op.date) return;
        d.exceptions[`${op.date}|${slot.id}`] = { cancelled: true };
        notes.push(`Cancelled ${op.date} ${slot.label}`);
      } else if (op.type === "add_oneoff") {
        const c = findCourse(d, op.course) || (() => {
          const nc = { id: "c_" + Math.random().toString(36).slice(2, 7), name: op.course, faculty: op.faculty || "TBA", color: slugColor(d.courses.length), total: 20, done: 0 };
          d.courses = [...d.courses, nc];
          return nc;
        })();
        let slot;
        [d, slot] = ensureSlot(d, op.slot);
        if (!op.date) return;
        d.exceptions[`${op.date}|${slot.id}`] = { courseId: c.id };
        if (op.faculty) d.courses = d.courses.map((x) => x.id === c.id ? { ...x, faculty: op.faculty } : x);
        notes.push(`Added one-off ${c.name} on ${op.date}`);
      } else if (op.type === "reschedule_oneoff") {
        const fromSlot = findSlot(d, op.fromSlot);
        if (!fromSlot || !op.date) return;
        let toSlot;
        [d, toSlot] = ensureSlot(d, op.toSlot);
        // figure out which course sits in the fromSlot on that date (exception or recurring)
        const exKey = `${op.date}|${fromSlot.id}`;
        let courseId = null, due = "";
        if (d.exceptions[exKey] && !d.exceptions[exKey].cancelled) {
          courseId = d.exceptions[exKey].courseId; due = d.exceptions[exKey].due || "";
        } else {
          const dt = new Date(op.date + "T00:00:00");
          const dayName = DAYS[(dt.getDay() + 6) % 7];
          const base = d.sessions.find((s) => s.day === dayName && s.slotId === fromSlot.id);
          if (base) { courseId = base.courseId; due = base.due || ""; }
        }
        if (!courseId) return;
        d.exceptions[exKey] = { cancelled: true };               // empty the old time on that date
        d.exceptions[`${op.date}|${toSlot.id}`] = { courseId, due }; // place it at the new time
        notes.push(`Rescheduled ${op.date} to ${toSlot.label}`);
      } else if (op.type === "clear_exception") {
        const slot = findSlot(d, op.slot);
        if (!slot || !op.date) return;
        delete d.exceptions[`${op.date}|${slot.id}`];
        notes.push(`Restored normal class on ${op.date}`);
      } else if (op.type === "restore_date") {
        if (!op.date) return;
        let removed = 0;
        Object.keys(d.exceptions).forEach((k) => { if (k.startsWith(op.date + "|")) { delete d.exceptions[k]; removed++; } });
        notes.push(`Restored all ${removed} change(s) on ${op.date}`);
      } else if (op.type === "mark_done") {
        if (!op.date) return;
        const delta = op.delta === -1 ? -1 : 1;
        const dt = new Date(op.date + "T00:00:00");
        const dayName = DAYS[(dt.getDay() + 6) % 7]; // weekend -> undefined
        if (!dayName) { notes.push(`${op.date} is a weekend — no classes`); return; }
        // Resolve which course sits in each slot on that date (exception wins over recurring),
        // skipping cancelled cells.
        const targetCourse = op.course ? findCourse(d, op.course) : null;
        const courseIdsThatDay = [];
        d.slots.forEach((slot) => {
          const ex = d.exceptions[`${op.date}|${slot.id}`];
          let cid = null;
          if (ex) { if (!ex.cancelled) cid = ex.courseId; }
          else { const base = d.sessions.find((s) => s.day === dayName && s.slotId === slot.id); if (base) cid = base.courseId; }
          if (cid) courseIdsThatDay.push(cid);
        });
        let chosen = targetCourse ? courseIdsThatDay.filter((id) => id === targetCourse.id) : courseIdsThatDay;
        if (targetCourse && chosen.length === 0) chosen = [targetCourse.id]; // fallback: course named but not found that day
        const bump = {};
        chosen.forEach((id) => { bump[id] = (bump[id] || 0) + delta; });
        d.courses = d.courses.map((c) => bump[c.id]
          ? { ...c, done: Math.max(0, Math.min(c.total, (c.done || 0) + bump[c.id])) }
          : c);
        const names = [...new Set(chosen)].map((id) => d.courses.find((c) => c.id === id)?.name).filter(Boolean);
        notes.push(`${delta > 0 ? "Marked done" : "Unmarked"} on ${op.date}: ${names.join(", ")}`);
      } else if (op.type === "add_assessment") {
        const c = findCourse(d, op.course);
        const item = {
          id: "as_" + Math.random().toString(36).slice(2, 8),
          kind: op.kind === "quiz" ? "quiz" : "assignment",
          courseId: c ? c.id : null,
          courseName: c ? c.name : (op.course || "General"),
          title: op.title || (op.kind === "quiz" ? "Quiz" : "Assignment"),
          date: op.date || "",
          details: op.details || "",
          marks: op.marks || "",
          done: false,
        };
        d.assessments = [...d.assessments, item];
        notes.push(`Added ${item.kind}: ${item.title}${c ? ` (${c.name})` : ""}`);
      } else if (op.type === "update_assessment") {
        const m = (op.match || "").toLowerCase();
        const idx = d.assessments.findIndex((a) =>
          a.title.toLowerCase().includes(m) || a.courseName.toLowerCase().includes(m) || m.includes(a.title.toLowerCase()));
        if (idx < 0) return;
        const c = op.course ? findCourse(d, op.course) : null;
        d.assessments = d.assessments.map((a, i) => i === idx ? {
          ...a,
          kind: op.kind || a.kind,
          title: op.title || a.title,
          date: op.date != null ? op.date : a.date,
          details: op.details != null ? op.details : a.details,
          marks: op.marks != null ? op.marks : a.marks,
          done: op.done != null ? op.done : a.done,
          ...(c ? { courseId: c.id, courseName: c.name } : {}),
        } : a);
        notes.push(`Updated ${d.assessments[idx].title}`);
      } else if (op.type === "remove_assessment") {
        const m = (op.match || "").toLowerCase();
        const before = d.assessments.length;
        d.assessments = d.assessments.filter((a) =>
          !(a.title.toLowerCase().includes(m) || a.courseName.toLowerCase().includes(m) || m.includes(a.title.toLowerCase())));
        notes.push(before > d.assessments.length ? `Removed assessment` : `No matching assessment`);
      }
    } catch (e) { /* skip bad op */ }
  });
  return { data: d, notes };
}

/* ============================================================
   UI
   ============================================================ */
// One-time repair: collapse duplicate near-identical time slots that arose from
// earlier edit bugs, drop now-empty leftover slots, and patch any session that
// got recreated with a placeholder "TBA" faculty by matching it back to the
// known Term 7 grid for that day.
function repairData(data) {
  let d = { ...data, slots: [...data.slots], sessions: [...data.sessions], courses: [...data.courses], exceptions: { ...(data.exceptions || {}) }, assessments: [...(data.assessments || [])] };
  const norm = (s) => s.toLowerCase().replace(/\s|–|-|\.|:/g, "");

  // 1) merge slots whose labels collapse to the same digits except minor punctuation,
  //    but only when one of them has zero sessions (the leftover empty duplicate)
  const slotSessionCount = (slotId) => d.sessions.filter((s) => s.slotId === slotId).length;
  for (let i = 0; i < d.slots.length; i++) {
    for (let j = i + 1; j < d.slots.length; j++) {
      const a = d.slots[i], b = d.slots[j];
      if (!a || !b) continue;
      const closeTime = Math.abs(a.sort - b.sort) <= 20; // within 20 min start-time = likely the same row
      if (!closeTime) continue;
      const aCount = slotSessionCount(a.id), bCount = slotSessionCount(b.id);
      if (aCount === 0 && bCount > 0) {
        d.slots = d.slots.filter((s) => s.id !== a.id);
      } else if (bCount === 0 && aCount > 0) {
        d.slots = d.slots.filter((s) => s.id !== b.id);
      }
    }
  }

  // 2) known-correct Term 7 grid to patch any "TBA"/placeholder sessions back to reality
  const KNOWN = {
    Monday: ["ops", "ent", "pricing"],
    Tuesday: ["rm", "pricing", "sales"],
    Wednesday: ["ops", "ent", "pfm"],
    Thursday: ["hrm", "pfm", "sales"],
    Friday: ["rm", "hrm", null],
  };
  const slotsSorted = [...d.slots].sort((a, b) => a.sort - b.sort);
  const courseById = {}; d.courses.forEach((c) => (courseById[c.id] = c));
  d.sessions = d.sessions.map((se) => {
    const course = courseById[se.courseId];
    const looksPlaceholder = !course || course.faculty === "TBA" || course.name === se.course;
    if (!looksPlaceholder) return se;
    const slotIdx = slotsSorted.findIndex((s) => s.id === se.slotId);
    const expectedId = KNOWN[se.day] ? KNOWN[se.day][slotIdx] : null;
    if (expectedId && courseById[expectedId]) {
      return { ...se, courseId: expectedId };
    }
    return se;
  });

  // 3) drop any now-fully-empty slot rows (defensive cleanup)
  const used = new Set(d.sessions.map((s) => s.slotId));
  d.slots = d.slots.filter((s) => used.has(s.id) || DEFAULT_SLOTS.some((ds) => ds.id === s.id));

  return d;
}

function App() {
  const [data, setData] = useState(null);
  const [tab, setTab] = useState("schedule");
  const [weekOffset, setWeekOffset] = useState(0);
  const [selected, setSelected] = useState(null); // {sessionId, dateISO}
  const loadedRef = useRef(false);

  // load
  useEffect(() => {
    const DEFAULTS = {
      courses: DEFAULT_COURSES,
      slots: DEFAULT_SLOTS,
      sessions: DEFAULT_SESSIONS,
      exceptions: {},
      assessments: [],
      termStartISO: "2026-06-22",
      termWeeks: 10,
    };
    (async () => {
      let saved = null;
      if (store.backend !== "none") {
        try {
          // don't let a slow/unreachable database hang the UI forever
          saved = await Promise.race([
            store.get(STORAGE_KEY),
            new Promise((resolve) => setTimeout(() => resolve(undefined), 6000)),
          ]);
        } catch (e) { saved = null; }
      }
      if (saved && saved.courses) {
        const fixed = repairData(saved);
        setData(fixed);
        try { if (store.backend !== "none") store.set(STORAGE_KEY, fixed); } catch (e) {}
      } else {
        // Nothing saved yet (or load failed/timed out) → seed defaults and try to save them.
        setData(DEFAULTS);
        try { if (store.backend !== "none" && saved !== undefined) store.set(STORAGE_KEY, DEFAULTS); } catch (e) {}
      }
      loadedRef.current = true;
    })();
  }, []);

  // persist
  useEffect(() => {
    if (!loadedRef.current || !data) return;
    if (store.backend !== "none") store.set(STORAGE_KEY, data);
  }, [data]);

  const slotsSorted = useMemo(() => (data ? [...data.slots].sort((a, b) => a.sort - b.sort) : []), [data]);
  const courseById = useMemo(() => {
    const m = {}; if (data) data.courses.forEach((c) => (m[c.id] = c)); return m;
  }, [data]);

  const weekMon = useMemo(() => addDays(mondayOf(new Date()), weekOffset * 7), [weekOffset]);
  const weekDates = useMemo(() => DAYS.map((_, i) => addDays(weekMon, i)), [weekMon]);

  const sessionAt = useCallback((day, slotId) => data?.sessions.find((s) => s.day === day && s.slotId === slotId), [data]);

  // Resolve what actually shows in a cell for a specific DATE: a date-exception wins
  // over the recurring template. Returns { kind, session } where kind is
  // "recurring" | "override" | "cancelled" | "empty".
  const resolveCell = useCallback((day, slotId, dateISO) => {
    const ex = data?.exceptions?.[`${dateISO}|${slotId}`];
    if (ex) {
      if (ex.cancelled) return { kind: "cancelled", session: null, exception: ex };
      return {
        kind: "override",
        session: { id: `ex|${dateISO}|${slotId}`, day, slotId, courseId: ex.courseId, due: ex.due || "", _override: true },
        exception: ex,
      };
    }
    const base = data?.sessions.find((s) => s.day === day && s.slotId === slotId);
    if (!base) return { kind: "empty", session: null };
    return { kind: "recurring", session: base };
  }, [data]);

  // class number for a specific occurrence (chronological position from term start)
  const occInfo = useCallback((session, dateISO) => {
    if (!data || !session) return { number: null };
    const list = enumerateCourse(data, session.courseId);
    const idx = list.findIndex((o) => o.dateISO === dateISO && o.slotId === session.slotId);
    const course = data.courses.find((c) => c.id === session.courseId);
    return { number: idx >= 0 ? idx + 1 : null, total: course ? course.total : list.length };
  }, [data]);

  // adjust completed count for a course (clamped to 0..total)
  const setDone = useCallback((courseId, delta) => {
    setData((d) => ({
      ...d,
      courses: d.courses.map((c) =>
        c.id === courseId ? { ...c, done: Math.max(0, Math.min(c.total, c.done + delta)) } : c),
    }));
  }, []);

  const setField = useCallback((courseId, patch) => {
    setData((d) => ({ ...d, courses: d.courses.map((c) => c.id === courseId ? { ...c, ...patch } : c) }));
  }, []);

  if (!data) return (
    <div style={{ padding: 40, fontFamily: "system-ui", color: "#2f5a1c" }}>
      <div style={{ fontSize: 18, marginBottom: 8 }}>Loading schedule…</div>
      <div style={{ fontSize: 12, color: "#6f766a" }}>
        {BUILD_TAG} · storage: {store.backend}
        {store.backend === "supabase" ? " (connecting to database…)" : store.backend === "none" ? " — not saved anywhere; add Supabase keys to sync" : ""}
      </div>
    </div>
  );

  const selCell = selected ? resolveCell(selected.day, selected.slotId, selected.dateISO) : null;
  const selSession = selCell ? selCell.session : null;

  return (
    <div className="ir-root">
      <style>{CSS}</style>

      {/* Header */}
      <header className="ir-header">
        <div className="ir-brand">
          <img src={LOGO} alt="IIM Ranchi" className="ir-logo" />
          <div className="ir-brand-text">
            <div className="ir-title">Class Schedule</div>
            <div className="ir-sub">IPM 2024–29 · Term 7</div>
          </div>
        </div>
        <nav className="ir-tabs" role="tablist">
          <button className={`ir-tab ${tab === "schedule" ? "on" : ""}`} onClick={() => setTab("schedule")} role="tab" aria-selected={tab === "schedule"}>Timetable</button>
          <button className={`ir-tab ${tab === "progress" ? "on" : ""}`} onClick={() => setTab("progress")} role="tab" aria-selected={tab === "progress"}>Progress</button>
          <button className={`ir-tab ${tab === "work" ? "on" : ""}`} onClick={() => setTab("work")} role="tab" aria-selected={tab === "work"}>Quizzes &amp; Work</button>
        </nav>
      </header>

      {/* Command bar */}
      <CommandBar data={data} setData={setData} />

      {tab === "schedule" && (
        <ScheduleView
          data={data} slotsSorted={slotsSorted} courseById={courseById}
          weekDates={weekDates} weekOffset={weekOffset} setWeekOffset={setWeekOffset}
          sessionAt={sessionAt} occInfo={occInfo} resolveCell={resolveCell}
          onPick={(session, dateISO) => setSelected({ day: session.day, slotId: session.slotId, dateISO })}
        />
      )}

      {tab === "progress" && (
        <ProgressView data={data} setDone={setDone} setField={setField} setData={setData} />
      )}

      {tab === "work" && (
        <WorkView data={data} courseById={courseById} setData={setData} />
      )}

      {/* Details modal */}
      {selected && selCell && (
        <DetailsModal
          data={data}
          cell={selCell}
          session={selSession}
          dateISO={selected.dateISO}
          day={selected.day}
          course={selSession ? courseById[selSession.courseId] : null}
          slot={data.slots.find((s) => s.id === selected.slotId)}
          info={selSession ? occInfo(selSession, selected.dateISO) : { number: null }}
          onClose={() => setSelected(null)}
          onSetDue={(due) => setData((d) => {
            if (selCell.kind === "override") {
              const k = `${selected.dateISO}|${selected.slotId}`;
              return { ...d, exceptions: { ...d.exceptions, [k]: { ...d.exceptions[k], due } } };
            }
            return { ...d, sessions: d.sessions.map((s) => (s.day === selected.day && s.slotId === selected.slotId) ? { ...s, due } : s) };
          })}
          onSetFaculty={(f) => setData((d) => ({ ...d, courses: d.courses.map((c) => c.id === selSession.courseId ? { ...c, faculty: f } : c) }))}
          onCancelDate={() => { setData((d) => ({ ...d, exceptions: { ...d.exceptions, [`${selected.dateISO}|${selected.slotId}`]: { cancelled: true } } })); setSelected(null); }}
          onRestoreDate={() => { setData((d) => { const ex = { ...d.exceptions }; delete ex[`${selected.dateISO}|${selected.slotId}`]; return { ...d, exceptions: ex }; }); setSelected(null); }}
        />
      )}

      <footer className="ir-foot">
        <span>Venue: Nilambar 12</span>
        <span className="ir-foot-tag">बहिर्मुखी विकास गन्तव्यम्</span>
      </footer>
    </div>
  );
}

/* ---------- Command bar (natural language editing) ---------- */
function CommandBar({ data, setData }) {
  const [text, setText] = useState("");
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState(null); // {kind, text}
  const [debug, setDebug] = useState(null); // {prompt, raw, ops, guarded, applied, notes}
  const [showDebug, setShowDebug] = useState(false);

  // Deterministic safety net: if the user's words clearly mean "I completed/attended classes",
  // never allow the result to cancel classes. Convert any cancel_class the model returned into
  // mark_done for the same date, and drop absolute "done" overwrites.
  const guardOps = (rawPrompt, ops) => {
    const p = rawPrompt.toLowerCase();
    const completeIntent = /\b(complete|completed|completing|done|attended|attend|finished|finish|did|tick|ticked|mark(ed)?\s+(it|them|all|these|those|the\s+class)?\s*(as\s+)?(complete|completed|done|attended))\b/.test(p);
    const cancelIntent = /\b(cancel|cancelled|no class|no classes|off|holiday|skip|skipped|remove|removed|didn'?t happen|not happening)\b/.test(p);
    if (!completeIntent || cancelIntent) return ops; // only intervene on a clear, unambiguous "complete" request
    const out = [];
    const seenDates = new Set();
    (ops || []).forEach((op) => {
      if (op.type === "cancel_class" && op.date) {
        if (!seenDates.has(op.date)) { out.push({ type: "mark_done", date: op.date }); seenDates.add(op.date); }
      } else if (op.type === "update_course" && op.done != null) {
        const { done, ...rest } = op;
        if (rest.newName || rest.faculty || rest.total != null || rest.photo) out.push(rest);
      } else if (op.type === "mark_done") {
        out.push(op);
        if (op.date) seenDates.add(op.date);
      } else {
        out.push(op);
      }
    });
    return out;
  };

  const submit = async () => {
    const prompt = text.trim();
    if (!prompt || busy) return;
    setBusy(true); setMsg(null);
    try {
      const result = await runAssistant(prompt, data);
      const rawOps = result.ops || [];
      const safeOps = guardOps(prompt, rawOps);
      const { data: nd, notes } = applyOps(data, safeOps);
      setData(nd);
      setText("");
      const guarded = JSON.stringify(safeOps) !== JSON.stringify(rawOps);
      setDebug({ prompt, reply: result.reply, ops: rawOps, guarded: safeOps, didGuard: guarded, notes });
      setMsg({ kind: "ok", text: (notes.length ? notes.join(" · ") : (result.reply || "Done.")) + (guarded ? " (corrected to completed)" : "") });
    } catch (e) {
      setDebug({ prompt, error: String(e && e.message || e) });
      setMsg({ kind: "err", text: "Couldn't apply that. Try rephrasing, e.g. “Move Sales Management on Thursday to the 9 AM slot”." });
    } finally {
      setBusy(false);
    }
  };

  return (
    <div className="ir-cmd">
      <div className="ir-cmd-icon" aria-hidden>✎</div>
      <input
        className="ir-cmd-input"
        placeholder="Update the schedule in plain English — e.g. “Cancel Friday’s 9 AM class” or “Pricing has a quiz next class”"
        value={text}
        onChange={(e) => setText(e.target.value)}
        onKeyDown={(e) => { if (e.key === "Enter") submit(); }}
        aria-label="Schedule command"
      />
      <button className="ir-cmd-btn" onClick={submit} disabled={busy || !text.trim()}>
        {busy ? "Applying…" : "Update"}
      </button>
      {msg && <div className={`ir-cmd-msg ${msg.kind}`}>{msg.text}</div>}
      <button className="ir-debug-toggle" onClick={() => setShowDebug((s) => !s)} type="button">
        {showDebug ? "Hide" : "Show"} debug · {BUILD_TAG}
      </button>
      {showDebug && (
        <div className="ir-debug">
          {!debug && <div className="ir-debug-empty">Run a command, then this shows the raw operations returned and what was applied. Build: <b>{BUILD_TAG}</b></div>}
          {debug && (
            <>
              <div className="ir-debug-row"><span>Build</span><code>{BUILD_TAG}</code></div>
              <div className="ir-debug-row"><span>You typed</span><code>{debug.prompt}</code></div>
              {debug.error
                ? <div className="ir-debug-row"><span>Error</span><code>{debug.error}</code></div>
                : <>
                    <div className="ir-debug-row"><span>Assistant returned</span><code>{JSON.stringify(debug.ops)}</code></div>
                    <div className="ir-debug-row"><span>Guard rewrote to</span><code className={debug.didGuard ? "hot" : ""}>{JSON.stringify(debug.guarded)}</code></div>
                    <div className="ir-debug-row"><span>Guard fired?</span><code>{debug.didGuard ? "YES — cancel/overwrite was corrected" : "no change needed"}</code></div>
                    <div className="ir-debug-row"><span>Applied result</span><code>{(debug.notes || []).join(" · ") || "—"}</code></div>
                  </>}
            </>
          )}
        </div>
      )}
    </div>
  );
}

/* ---------- Schedule grid ---------- */
function ScheduleView({ data, slotsSorted, courseById, weekDates, weekOffset, setWeekOffset, sessionAt, occInfo, resolveCell, onPick }) {
  const todayISO = iso(new Date());

  // "Due next" upcoming items in this viewed week (date-aware: exceptions override template)
  const dueItems = [];
  DAYS.forEach((day, di) => {
    const dISO = iso(weekDates[di]);
    slotsSorted.forEach((slot) => {
      const { session: se } = resolveCell(day, slot.id, dISO);
      if (se && se.due) {
        const c = courseById[se.courseId];
        dueItems.push({ course: c, day, slot, due: se.due, dateISO: dISO });
      }
    });
  });

  return (
    <section className="ir-panel">
      <div className="ir-weeknav">
        <button className="ir-wk-btn" onClick={() => setWeekOffset((w) => w - 1)} aria-label="Previous week">←</button>
        <div className="ir-wk-label">
          <strong>{weekOffset === 0 ? "This week" : weekOffset === 1 ? "Next week" : weekOffset === -1 ? "Last week" : `Week of ${fmtShort(weekDates[0])}`}</strong>
          <span>{fmtShort(weekDates[0])} – {fmtShort(weekDates[4])}, {weekDates[0].getFullYear()}</span>
        </div>
        <button className="ir-wk-btn" onClick={() => setWeekOffset((w) => w + 1)} aria-label="Next week">→</button>
        {weekOffset !== 0 && <button className="ir-wk-today" onClick={() => setWeekOffset(0)}>Today</button>}
      </div>

      {dueItems.length > 0 && (
        <div className="ir-due-strip">
          <span className="ir-due-head">Due this week</span>
          {dueItems.map((it, i) => (
            <span key={i} className="ir-due-chip" style={{ borderColor: it.course?.color }}>
              <i style={{ background: it.course?.color }} />
              <b>{it.course?.name}</b> — {it.due} <em>({DAY_SHORT[it.day]})</em>
            </span>
          ))}
        </div>
      )}

      <div className="ir-grid-wrap">
        <div className="ir-grid" style={{ gridTemplateColumns: `92px repeat(5, minmax(150px, 1fr))` }}>
          {/* corner */}
          <div className="ir-cell ir-corner">Time</div>
          {/* day headers */}
          {DAYS.map((day, i) => {
            const isToday = iso(weekDates[i]) === todayISO;
            return (
              <div key={day} className={`ir-cell ir-dayhead ${isToday ? "today" : ""}`}>
                <span className="ir-dayname">{DAY_SHORT[day]}</span>
                <span className="ir-daydate">{fmtShort(weekDates[i])}</span>
              </div>
            );
          })}

          {/* rows = time slots */}
          {slotsSorted.map((slot) => (
            <React.Fragment key={slot.id}>
              <div className="ir-cell ir-timecol">{slot.label}</div>
              {DAYS.map((day, di) => {
                const dateISO = iso(weekDates[di]);
                const { kind, session: se } = resolveCell(day, slot.id, dateISO);
                const isToday = dateISO === todayISO;
                if (kind === "cancelled") {
                  return (
                    <button key={day + slot.id} className={`ir-cell ir-class ir-cancelled ${isToday ? "today" : ""}`} onClick={() => onPick({ id: `ex|${dateISO}|${slot.id}`, day, slotId: slot.id, _cancelledPlaceholder: true }, dateISO)}>
                      <span className="ir-cancelled-tag">Cancelled</span>
                      <span className="ir-cancelled-sub">{DAY_SHORT[day]} {fmtShort(weekDates[di])}</span>
                    </button>
                  );
                }
                if (!se) return <div key={day + slot.id} className="ir-cell ir-empty">—</div>;
                const c = courseById[se.courseId];
                const { number } = occInfo(se, dateISO);
                return (
                  <button
                    key={day + slot.id}
                    className={`ir-cell ir-class ${isToday ? "today" : ""} ${se._override ? "ir-override" : ""}`}
                    style={{ "--accent": c?.color }}
                    onClick={() => onPick(se, dateISO)}
                  >
                    <span className="ir-class-row">
                      {c?.photo && <img className="ir-class-avatar" src={c.photo} alt={c.faculty} loading="lazy" onError={(e) => { e.currentTarget.style.display = "none"; }} />}
                      <span className="ir-class-text">
                        <span className="ir-class-name">{c?.name}</span>
                        <span className="ir-class-fac">{c?.faculty}</span>
                      </span>
                    </span>
                    <span className="ir-class-foot">
                      {se._override ? <span className="ir-class-once">This week only</span> : (number ? <span className="ir-class-no">Class {number}</span> : <span />)}
                      {se.due && <span className="ir-class-due" title={se.due}>● due</span>}
                    </span>
                  </button>
                );
              })}
            </React.Fragment>
          ))}
        </div>
      </div>
      <p className="ir-hint">Tap any class for full details, the date, faculty, and which number class it is this term.</p>
    </section>
  );
}

/* ---------- Details modal ---------- */
function DetailsModal({ data, cell, session, dateISO, day, course, slot, info, onClose, onSetDue: setDue, onSetFaculty: setFac, onCancelDate, onRestoreDate }) {
  const date = new Date(dateISO + "T00:00:00");
  const isCancelled = cell.kind === "cancelled";
  const isOverride = cell.kind === "override";
  const [dueText, setDueText] = useState(session?.due || "");
  const [fac, setFacL] = useState(course?.faculty || "");
  const [edit, setEdit] = useState(false);

  useEffect(() => { setDueText(session?.due || ""); setFacL(course?.faculty || ""); setEdit(false); }, [dateISO, slot?.id, cell.kind]);

  // Cancelled-cell view: just show it's cancelled with a restore option
  if (isCancelled) {
    return (
      <div className="ir-modal-bg" onClick={onClose}>
        <div className="ir-modal" onClick={(e) => e.stopPropagation()} role="dialog" aria-modal="true">
          <div className="ir-modal-accent" style={{ background: "#c98b8b" }} />
          <button className="ir-modal-x" onClick={onClose} aria-label="Close">✕</button>
          <div className="ir-modal-head">
            <span className="ir-modal-dot" style={{ background: "#c98b8b" }} />
            <h2>Class cancelled</h2>
          </div>
          <dl className="ir-detail">
            <div><dt>Date</dt><dd>{fmtLong(date)}</dd></div>
            <div><dt>Time</dt><dd>{slot?.label}</dd></div>
          </dl>
          <p className="ir-due-none" style={{ marginBottom: 16 }}>This class was cancelled for this date only. Other weeks are unaffected.</p>
          <div className="ir-modal-actions">
            <button className="ir-btn solid" onClick={onRestoreDate}>Restore this class</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="ir-modal-bg" onClick={onClose}>
      <div className="ir-modal" onClick={(e) => e.stopPropagation()} role="dialog" aria-modal="true">
        <div className="ir-modal-accent" style={{ background: course?.color }} />
        <button className="ir-modal-x" onClick={onClose} aria-label="Close">✕</button>

        <div className="ir-modal-head">
          {course?.photo
            ? <img className="ir-modal-avatar" src={course.photo} alt={course.faculty} onError={(e) => { e.currentTarget.style.display = "none"; }} />
            : <span className="ir-modal-dot" style={{ background: course?.color }} />}
          <h2>{course?.name}</h2>
        </div>

        {isOverride && <div className="ir-once-banner">One-off class — this date only</div>}

        <dl className="ir-detail">
          <div><dt>Faculty</dt><dd>
            {edit ? <input className="ir-inp" value={fac} onChange={(e) => setFacL(e.target.value)} /> : course?.faculty}
          </dd></div>
          <div><dt>Date</dt><dd>{fmtLong(date)}</dd></div>
          <div><dt>Time</dt><dd>{slot?.label}</dd></div>
          <div><dt>Venue</dt><dd>Nilambar 12</dd></div>
          <div><dt>Session</dt><dd>{isOverride ? "Extra / one-off" : (info.number ? `Class ${info.number} of ${course?.total} this term` : "—")}</dd></div>
          <div><dt>Completed</dt><dd>{course?.done} of {course?.total} done</dd></div>
        </dl>

        <div className="ir-due-edit">
          <label>Due for this class</label>
          {edit ? (
            <textarea className="ir-inp ir-ta" rows={2} value={dueText} onChange={(e) => setDueText(e.target.value)} placeholder="e.g. Submit case write-up, read Ch. 4" />
          ) : (
            <p className={session?.due ? "ir-due-show" : "ir-due-none"}>{session?.due || "Nothing due."}</p>
          )}
        </div>

        <div className="ir-modal-actions">
          {!edit ? (
            <button className="ir-btn solid" onClick={() => setEdit(true)}>Edit details</button>
          ) : (
            <button className="ir-btn solid" onClick={() => { setDue(dueText); setFac(fac); setEdit(false); }}>Save</button>
          )}
          {isOverride
            ? <button className="ir-btn danger" onClick={onRestoreDate}>Remove this one-off</button>
            : <button className="ir-btn danger" onClick={onCancelDate}>Cancel this date</button>}
        </div>
        {!isOverride && <p className="ir-modal-foot-note">“Cancel this date” only affects {fmtShort(date)} — every other {day} stays scheduled.</p>}
      </div>
    </div>
  );
}

/* ---------- Progress / attendance tab ---------- */
/* ---------- Quizzes & Assignments tab ---------- */
function WorkView({ data, courseById, setData }) {
  const items = data.assessments || [];
  const todayISO = iso(new Date());
  const withMeta = items.map((a) => {
    const c = a.courseId ? courseById[a.courseId] : null;
    const overdue = a.date && a.date < todayISO && !a.done;
    return { ...a, color: c?.color || "#7a8a6a", overdue };
  });
  // sort: not-done first (by due date, undated last), then done
  const sorted = [...withMeta].sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    if (!a.date && b.date) return 1;
    if (a.date && !b.date) return -1;
    return (a.date || "").localeCompare(b.date || "");
  });
  const pending = sorted.filter((a) => !a.done);
  const done = sorted.filter((a) => a.done);

  const toggleDone = (id) => setData((d) => ({ ...d, assessments: d.assessments.map((a) => a.id === id ? { ...a, done: !a.done } : a) }));
  const remove = (id) => setData((d) => ({ ...d, assessments: d.assessments.filter((a) => a.id !== id) }));

  const fmtDue = (iso) => {
    if (!iso) return "No due date";
    const dt = new Date(iso + "T00:00:00");
    return dt.toLocaleDateString("en-IN", { weekday: "short", day: "numeric", month: "short" });
  };

  const Card = (a) => (
    <div key={a.id} className={`ir-work-card ${a.done ? "done" : ""} ${a.overdue ? "overdue" : ""}`} style={{ "--accent": a.color }}>
      <div className="ir-work-top">
        <span className={`ir-work-kind ${a.kind}`}>{a.kind === "quiz" ? "Quiz" : "Assignment"}</span>
        {a.marks && <span className="ir-work-marks">{a.marks}</span>}
        <span className="ir-work-due">{a.overdue ? "Overdue · " : ""}{fmtDue(a.date)}</span>
      </div>
      <div className="ir-work-title">{a.title}</div>
      <div className="ir-work-course">{a.courseName}</div>
      {a.details && <div className="ir-work-details">{a.details}</div>}
      <div className="ir-work-actions">
        <button className={`ir-btn ${a.done ? "ghost" : "solid"}`} onClick={() => toggleDone(a.id)}>{a.done ? "Mark not done" : "Mark done"}</button>
        <button className="ir-btn danger" onClick={() => remove(a.id)}>Delete</button>
      </div>
    </div>
  );

  return (
    <section className="ir-panel">
      <div className="ir-work-head">
        <div>
          <h2 className="ir-work-h2">Quizzes &amp; Assignments</h2>
          <p className="ir-work-sub">{pending.length} pending · {done.length} done</p>
        </div>
      </div>

      <div className="ir-work-hint">
        Add these from the command bar, e.g. <em>“Pricing quiz on the 7th, 10 marks, covers price elasticity”</em> or <em>“HRM assignment due Friday on motivation theories”</em>.
      </div>

      {pending.length === 0 && done.length === 0 && (
        <div className="ir-work-empty">Nothing added yet. Use the command bar above to add a quiz or assignment.</div>
      )}

      {pending.length > 0 && <>
        <div className="ir-work-section">Upcoming</div>
        <div className="ir-work-grid">{pending.map(Card)}</div>
      </>}

      {done.length > 0 && <>
        <div className="ir-work-section">Completed</div>
        <div className="ir-work-grid">{done.map(Card)}</div>
      </>}
    </section>
  );
}

function ProgressView({ data, setDone, setField, setData }) {
  const courses = data.courses;
  const totalDone = courses.reduce((a, c) => a + (c.done || 0), 0);
  const totalAll = courses.reduce((a, c) => a + (c.total || 0), 0);
  const overall = totalAll ? Math.round((totalDone / totalAll) * 100) : 0;

  return (
    <section className="ir-panel">
      <div className="ir-overall">
        <div>
          <div className="ir-overall-num">{totalDone}<span>/{totalAll}</span></div>
          <div className="ir-overall-lbl">classes completed across {courses.length} courses this term</div>
        </div>
        <div className="ir-overall-ring" style={{ "--p": overall }}>
          <span>{overall}%</span>
        </div>
      </div>

      <div className="ir-prog-list">
        {courses.map((c) => {
          const done = c.done || 0;
          const tot = c.total || 1;
          const pct = Math.min(100, Math.round((done / tot) * 100));
          const left = Math.max(0, tot - done);
          return (
            <div key={c.id} className="ir-prog-row">
              <div className="ir-prog-top">
                <span className="ir-prog-dot" style={{ background: c.color }}>
                  {c.photo && <img src={c.photo} alt={c.faculty} onError={(e) => { e.currentTarget.style.display = "none"; }} />}
                </span>
                <div className="ir-prog-name">
                  <strong>{c.name}</strong>
                  <span>{c.faculty} · {left} left</span>
                </div>
                <div className="ir-prog-count" style={{ color: c.color }}>{done}<i>/{tot}</i></div>
              </div>
              <div className="ir-bar"><div className="ir-bar-fill" style={{ width: pct + "%", background: c.color }} /></div>
              <div className="ir-prog-actions">
                <button className="ir-step" onClick={() => setDone(c.id, -1)} aria-label="One less">−</button>
                <button className="ir-step" onClick={() => setDone(c.id, 1)} aria-label="One more">+</button>
                <span className="ir-prog-pct">{pct}% complete</span>
                <label className="ir-target">
                  Total
                  <input type="number" min="1" value={c.total}
                    onChange={(e) => setField(c.id, { total: Math.max(1, parseInt(e.target.value || "1", 10)) })} />
                </label>
              </div>
            </div>
          );
        })}
      </div>

      <div className="ir-termset">
        <label>Term started
          <input type="date" value={data.termStartISO}
            onChange={(e) => setData((d) => ({ ...d, termStartISO: e.target.value }))} />
        </label>
        <label>Weeks
          <input type="number" min="1" max="30" value={data.termWeeks}
            onChange={(e) => setData((d) => ({ ...d, termWeeks: Math.max(1, parseInt(e.target.value || "1", 10)) }))} />
        </label>
      </div>
    </section>
  );
}

.ir-work-hint em{color:var(--green-deep);font-style:normal;font-weight:600}
.ir-work-empty{text-align:center;color:#a6ae99;padding:32px;font-size:14px}
.ir-work-section{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--green-deep);margin:16px 0 10px}
.ir-work-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.ir-work-card{border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:12px;padding:13px 14px;background:var(--surface);display:flex;flex-direction:column;gap:5px}
.ir-work-card.done{opacity:.6}
.ir-work-card.overdue{border-color:#e0b3b3;background:#fdf7f6}
.ir-work-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ir-work-kind{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:2px 8px;border-radius:6px}
.ir-work-kind.quiz{background:#e6eef8;color:#3a5a8c}
.ir-work-kind.assignment{background:#f0ead9;color:#8a6a2b}
.ir-work-marks{font-size:11px;font-weight:700;color:var(--green-mid);background:#eef6e0;padding:2px 7px;border-radius:6px}
.ir-work-due{font-size:11.5px;color:var(--muted);margin-left:auto}
.ir-work-card.overdue .ir-work-due{color:#b4502a;font-weight:700}
.ir-work-title{font-size:15px;font-weight:650;color:var(--ink);line-height:1.3;margin-top:2px}
.ir-work-course{font-size:12.5px;color:var(--muted)}
.ir-work-details{font-size:12.5px;color:var(--ink);background:var(--tint);border-radius:8px;padding:7px 9px;margin-top:3px}
.ir-work-actions{display:flex;gap:8px;margin-top:8px}
.ir-work-actions .ir-btn{padding:6px 12px;font-size:12.5px}
.ir-work-actions .ir-btn.danger{margin-left:auto}
@media (max-width:560px){
  .ir-header{justify-content:center;text-align:center}
  .ir-tabs{width:100%}
  .ir-tab{flex:1}
  .ir-detail{grid-template-columns:1fr}
  .ir-btn.danger{margin-left:0}
}
@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
}
